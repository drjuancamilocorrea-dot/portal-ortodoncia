<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Propuesta de Tratamiento · Dr. Juan Camilo Correa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    /* ── Paleta coherente con landing drjuancamilocorrea.com ── */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --card: #1e293b;
    --card2: #253347;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(16,185,129,0.25);
    --accent: #10b981;
    --accent-dark: #059669;
    --accent-light: rgba(16,185,129,0.12);
    --navy: #0f172a;
    --navy2: #1e293b;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --muted: #64748b;
    --shadow: 0 4px 20px rgba(0,0,0,0.25);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-avatar {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-logo { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
  .header h1 { font-size: 17px; font-weight: 700; color: #ffffff; line-height: 1.3; }
  .header p { font-size: 12px; color: #94a3b8; margin-top: 1px; }
  .header-strip {
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-dark) 100%);
    height: 3px;
  }

  /* MAIN */
  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

  /* GREETING */
  .greeting {
    background: var(--navy);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .greeting::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .greeting h2 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; position: relative; }
  .greeting h2 span { color: var(--accent); }
  .greeting p { color: #94a3b8; font-size: 14px; line-height: 1.65; position: relative; }
  .greeting p strong { color: var(--accent); }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: #f8fafc;
  }
  .card-header .icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    background: rgba(16,185,129,0.15);
  }
  .card-header h3 { font-size: 14px; font-weight: 700; color: var(--navy); }
  .card-body { padding: 20px; }

  /* VISOR 3D */
  #visor3d {
    width: 100%; height: 300px;
    border-radius: 12px;
    background: #0f172a;
    position: relative;
    overflow: hidden;
  }
  #visor3d canvas { display: block; }
  .visor-controls { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .visor-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .visor-btn:hover { background: rgba(16,185,129,0.12); border-color: var(--accent); color: var(--accent); }
  .visor-tip { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }
  .no-stl {
    height: 300px; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; color: var(--muted); font-size: 14px;
    background: rgba(255,255,255,0.04); border-radius: 12px;
  }

  /* TRATAMIENTO */
  .trat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .trat-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }

  .trat-item .value { font-size: 15px; font-weight: 700; color: var(--text); }
  .trat-item .value.accent { color: var(--accent-dark); }
  .trat-item .value.green { color: var(--accent-dark); }

  /* NOTAS */

    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text2);
    margin-top: 14px;
  }

  /* PLANES */
  .plan-card {

    cursor: pointer;
    transition: all 0.2s;

  .plan-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(16,185,129,0.15); }
  .plan-card.selected { border-color: var(--accent); box-shadow: 0 4px 20px rgba(16,185,129,0.2); background: rgba(16,185,129,0.08); }
  .plan-card.selected::after {

    font-weight: 600;

  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;

  .modal {

  .expired-screen p { color: var(--text2); max-width: 300px; line-height: 1.6; }

  /* SUCCESS */
  .success-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;

  }
  .success-screen.show { display: flex; }
  .success-screen .check { font-size: 72px; margin-bottom: 16px; }
  .success-screen h2 { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .success-screen p { color: var(--text2); max-width: 300px; line-height: 1.6; margin-bottom: 20px; }

  .loading-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 80vh; flex-direction: column; gap: 16px;
  }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .trat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// VISOR 3D STL
let autoRotar = false;
let mesh = null;
let colores = ['#00e5a0','#f5a623','#4488ff','#ffffff'];
let colorIdx = 0;

async function cargarSTL() {
  try {
    const r = await fetch(`/api/propuesta/${token}/stl`);
    const d = await r.json();
    if (!d.stl) return;

    // Detectar si es múltiples STL (JSON array) o uno solo
    let stlBuffers = [];
    try {
      const parsed = JSON.parse(d.stl);
      if (Array.isArray(parsed)) {
        stlBuffers = parsed.map(b64str => {
          const base64 = b64str.split(',')[1];
          const bin = atob(base64);
          const buf = new ArrayBuffer(bin.length);
          const view = new Uint8Array(buf);
          for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
          return buf;
        });
      }
    } catch(e) {
      // STL simple
      const base64 = d.stl.split(',')[1];
      const bin = atob(base64);
      const buf = new ArrayBuffer(bin.length);
      const view = new Uint8Array(buf);
      for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
      stlBuffers = [buf];
    }
    iniciarVisor3D(stlBuffers);
  } catch(e) {
    document.getElementById('visor3d').innerHTML = '<div class="no-stl"><span style="font-size:32px">🦷</span><span>No se pudo cargar el modelo 3D</span></div>';
  }
}

function iniciarVisor3D(buffers) {
  const allBuffers = Array.isArray(buffers) ? buffers : [buffers];
  const container = document.getElementById('visor3d');
  if (!container) return;
  const W = container.clientWidth, H = 300;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f172a);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.set(0, 0, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.innerHTML = '';
  container.appendChild(renderer.domElement);

  // Luces
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
  dir1.position.set(5, 5, 5);
  scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x8888ff, 0.3);
  dir2.position.set(-5, -5, -5);
  scene.add(dir2);

  const colores = [0x00e5a0, 0x4499ff];
  const meshes = [];
  const geos = allBuffers.map(buf => {
    const g = parsearSTL(buf);
    g.computeVertexNormals();
    return g;
  });

  // Calcular bounding box del conjunto sin centrar individualmente
  const group = new THREE.Group();
  geos.forEach((geo, i) => {
    const mat = new THREE.MeshPhongMaterial({ color: colores[i % colores.length], specular: 0x333333, shininess: 60 });
    const m = new THREE.Mesh(geo, mat);
    group.add(m);
    meshes.push(m);
  });

  // Centrar el grupo completo
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3 / maxDim;

  group.position.sub(center.multiplyScalar(scale));
  group.scale.setScalar(scale);
  scene.add(group);
  mesh = group;

  // Controles táctiles/mouse
  let isDragging = false, prevX = 0, prevY = 0;
  const dom = renderer.domElement;

  dom.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  dom.addEventListener('mousemove', e => {
    if (!isDragging) return;
    mesh.rotation.y += (e.clientX - prevX) * 0.01;
    mesh.rotation.x += (e.clientY - prevY) * 0.01;
    prevX = e.clientX; prevY = e.clientY;
  });
  dom.addEventListener('mouseup', () => isDragging = false);

  dom.addEventListener('touchstart', e => { prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }, { passive: true });
  dom.addEventListener('touchmove', e => {
    mesh.rotation.y += (e.touches[0].clientX - prevX) * 0.015;
    mesh.rotation.x += (e.touches[0].clientY - prevY) * 0.015;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }, { passive: true });

  dom.addEventListener('wheel', e => { camera.position.z = Math.max(1, Math.min(15, camera.position.z + e.deltaY * 0.01)); });

  function animate() {
    requestAnimationFrame(animate);
    if (autoRotar && mesh) mesh.rotation.y += 0.008;
    renderer.render(scene, camera);
  }
  animate();
}

function parsearSTL(buffer) {
  const geo = new THREE.BufferGeometry();
  const view = new DataView(buffer);
  // Detectar binario vs ASCII
  const numTriangles = view.getUint32(80, true);
  const expectedSize = 84 + numTriangles * 50;

  if (buffer.byteLength === expectedSize) {
    // Binario
    const verts = new Float32Array(numTriangles * 9);
    const norms = new Float32Array(numTriangles * 9);
    for (let i = 0; i < numTriangles; i++) {
      const offset = 84 + i * 50;
      const nx = view.getFloat32(offset, true), ny = view.getFloat32(offset+4, true), nz = view.getFloat32(offset+8, true);
      for (let v = 0; v < 3; v++) {
        const voff = offset + 12 + v * 12;
        verts[i*9+v*3] = view.getFloat32(voff, true);
        verts[i*9+v*3+1] = view.getFloat32(voff+4, true);
        verts[i*9+v*3+2] = view.getFloat32(voff+8, true);
        norms[i*9+v*3] = nx; norms[i*9+v*3+1] = ny; norms[i*9+v*3+2] = nz;
      }
    }
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geo.setAttribute('normal', new THREE.BufferAttribute(norms, 3));
  } else {
    // ASCII fallback
    const text = new TextDecoder().decode(buffer);
    const verts = [];
    const re = /vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
    let m;
    while ((m = re.exec(text)) !== null) { verts.push(+m[1], +m[2], +m[3]); }
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  }
  return geo;
}

function resetCamara() { if (mesh) { mesh.rotation.set(0,0,0); mesh.position.set(0,0,0); } }
function toggleAutoRotar() { autoRotar = !autoRotar; }
function cambiarColor() {
  colorIdx = (colorIdx + 1) % colores.length;
  if (mesh) mesh.traverse(child => {
    if (child.isMesh) child.material.color.set(colores[colorIdx]);
  });
}

// MODAL
function seleccionarPlan(idx) {
  planSeleccionado = idx;
  document.querySelectorAll('.plan-card').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

function abrirModal() { document.getElementById('modal-confirmar').classList.add('show'); }
function cerrarModal() { document.getElementById('modal-confirmar').classList.remove('show'); }

async function confirmarAceptar() {
  cerrarModal();
  try {
    const r = await fetch(`/api/propuesta/${token}/aceptar`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ planIdx: planSeleccionado }) });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('cta-section').style.display = 'none';
      const ss = document.getElementById('success-screen');
      ss.classList.add('show');
      ss.scrollIntoView({ behavior: 'smooth' });
    }
  } catch(e) { alert('Hubo un error. Por favor escríbenos por WhatsApp.'); }
}
