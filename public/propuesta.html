<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Propuesta de Tratamiento · Dr. Juan Camilo Correa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --accent: #f5a623;
    --accent2: #00e5a0;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d0d15 0%, #1a0a2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% -20%, rgba(245,166,35,0.15) 0%, transparent 60%);
  }
  .header-logo { font-size: 13px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; position: relative; }
  .header h1 { font-size: 22px; font-weight: 700; position: relative; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; position: relative; }

  /* TIMER */
  .timer-bar {
    background: rgba(245,166,35,0.08);
    border-bottom: 1px solid rgba(245,166,35,0.2);
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; color: var(--accent);
  }
  .timer-bar span { font-weight: 700; font-size: 15px; }

  /* MAIN */
  .main { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }

  /* GREETING */
  .greeting {
    background: linear-gradient(135deg, var(--card), #1a1a2e);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    text-align: center;
  }
  .greeting h2 { font-size: 24px; margin-bottom: 8px; }
  .greeting h2 span { color: var(--accent); }
  .greeting p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* SECTION CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .card-header .icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    background: rgba(245,166,35,0.1);
  }
  .card-header h3 { font-size: 15px; font-weight: 600; }
  .card-body { padding: 20px; }

  /* SIMULACIÓN */
  .sim-container {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .sim-side { position: relative; border-radius: 12px; overflow: hidden; background: #0d0d15; }
  .sim-side img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
  .sim-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 8px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    font-size: 12px; font-weight: 600;
    text-align: center;
  }
  .sim-label.antes { color: #ff6b6b; }
  .sim-label.despues { color: var(--accent2); }
  .no-sim {
    grid-column: 1/-1;
    background: #0d0d15;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  /* VISOR 3D */
  #visor3d {
    width: 100%; height: 300px;
    border-radius: 12px;
    background: #080810;
    position: relative;
    overflow: hidden;
  }
  #visor3d canvas { display: block; }
  .visor-controls {
    display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
  }
  .visor-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .visor-btn:hover { background: rgba(245,166,35,0.1); border-color: var(--accent); color: var(--accent); }
  .visor-tip { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }
  .no-stl {
    height: 300px; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; color: var(--muted); font-size: 14px;
    background: #080810; border-radius: 12px;
  }

  /* TRATAMIENTO */
  .trat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .trat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .trat-item .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .trat-item .value { font-size: 16px; font-weight: 600; }
  .trat-item .value.accent { color: var(--accent); }
  .trat-item .value.green { color: var(--accent2); }

  /* PRESUPUESTO */
  .presup-total {
    background: linear-gradient(135deg, rgba(245,166,35,0.1), rgba(245,166,35,0.05));
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .presup-total .label { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .presup-total .amount { font-size: 32px; font-weight: 800; margin-top: 4px; }
  .presup-cuotas { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cuota-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .cuota-box .cl { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .cuota-box .cv { font-size: 20px; font-weight: 700; color: var(--accent2); }

  /* NOTAS */
  .notas-box {
    background: rgba(0,229,160,0.05);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #b0b0c8;
    margin-top: 16px;
  }

  /* CTA */
  .cta-section {
    background: linear-gradient(135deg, #1a0a2e, #0d1a2e);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .cta-section h3 { font-size: 20px; margin-bottom: 8px; }
  .cta-section p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .btn-aceptar {
    background: linear-gradient(135deg, var(--accent2), #00c47a);
    color: #000;
    border: none;
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    max-width: 320px;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 0 auto 12px;
  }
  .btn-aceptar:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,160,0.3); }
  .btn-wsp {
    background: rgba(37,211,102,0.1);
    color: #25d366;
    border: 1px solid rgba(37,211,102,0.3);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    max-width: 320px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 0 auto;
    text-decoration: none;
  }
  .btn-wsp:hover { background: rgba(37,211,102,0.2); }

  /* EXPIRADO / ERROR */
  .expired-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 80vh; text-align: center; padding: 40px;
  }
  .expired-screen .icon { font-size: 64px; margin-bottom: 16px; }
  .expired-screen h2 { font-size: 24px; margin-bottom: 8px; }
  .expired-screen p { color: var(--muted); max-width: 300px; line-height: 1.6; }

  /* MODAL CONFIRMAR */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    max-width: 360px; width: 90%;
    text-align: center;
  }
  .modal h3 { font-size: 20px; margin-bottom: 8px; }
  .modal p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
  .modal-btns { display: flex; flex-direction: column; gap: 10px; }
  .btn-confirmar {
    background: linear-gradient(135deg, var(--accent2), #00c47a);
    color: #000; border: none; padding: 14px;
    border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-cancelar {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); padding: 12px;
    border-radius: 10px; font-size: 14px; cursor: pointer;
  }

  /* SUCCESS */
  .success-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; text-align: center; padding: 40px;
  }
  .success-screen.show { display: flex; }
  .success-screen .check { font-size: 72px; margin-bottom: 16px; }
  .success-screen h2 { font-size: 26px; margin-bottom: 8px; }
  .success-screen p { color: var(--muted); max-width: 300px; line-height: 1.6; margin-bottom: 20px; }

  .loading-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 80vh; flex-direction: column; gap: 16px;
  }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .sim-container { grid-template-columns: 1fr; }
    .trat-grid { grid-template-columns: 1fr; }
    .presup-cuotas { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:14px">Cargando tu propuesta...</p>
  </div>
</div>

<!-- Modal confirmar -->
<div class="modal-overlay" id="modal-confirmar">
  <div class="modal">
    <h3>🎉 ¡Excelente decisión!</h3>
    <p>Al confirmar, quedas registrado como paciente y el Dr. Correa recibirá una notificación para coordinar el inicio de tu tratamiento.</p>
    <div class="modal-btns">
      <button class="btn-confirmar" onclick="confirmarAceptar()">✅ Confirmar que quiero iniciar</button>
      <button class="btn-cancelar" onclick="cerrarModal()">Pensarlo un poco más</button>
    </div>
  </div>
</div>

<script>
const token = location.pathname.split('/propuesta/')[1];
let propuestaData = null;
let renderer = null;

async function init() {
  try {
    const r = await fetch(`/api/propuesta/${token}`);
    if (r.status === 410) { mostrarExpirado(); return; }
    if (!r.ok) { mostrarError(); return; }
    propuestaData = await r.json();
    renderPropuesta(propuestaData);
    iniciarTimer();
  } catch(e) { mostrarError(); }
}

function fmt(n) { return '$' + parseInt(n || 0).toLocaleString('es-CO'); }

function renderPropuesta(p) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div class="header-logo">DR. JUAN CAMILO CORREA · ORTODONCIA</div>
      <h1>Tu Propuesta de Tratamiento</h1>
      <p>Preparada especialmente para ti</p>
    </div>

    <div class="timer-bar">
      ⏳ Esta propuesta expira en: <span id="timer">--:--:--</span>
    </div>

    <div class="main">
      <div class="greeting">
        <h2>¡Hola, <span>${p.nombre.split(' ')[0]}</span>! 👋</h2>
        <p>Hemos preparado esta propuesta personalizada basada en tu evaluación. Aquí encontrarás la simulación de tu sonrisa, el modelo 3D de tus dientes y todos los detalles de tu plan de tratamiento.</p>
      </div>

      ${p.foto || p.simulacion ? `
      <div class="card">
        <div class="card-header">
          <div class="icon">✨</div>
          <h3>Simulación de tu Sonrisa</h3>
        </div>
        <div class="card-body">
          ${p.simulacion ? `
          <div class="sim-container">
            <div class="sim-side">
              <img src="${p.foto}" alt="Antes">
              <div class="sim-label antes">Antes</div>
            </div>
            <div class="sim-side">
              <img src="${p.simulacion}" alt="Después">
              <div class="sim-label despues">Después estimado</div>
            </div>
          </div>
          <p style="font-size:12px;color:var(--muted);margin-top:12px;text-align:center">* Simulación generada con IA. Los resultados reales pueden variar según cada caso clínico.</p>
          ` : `
          <div class="sim-container">
            <div class="sim-side">
              <img src="${p.foto}" alt="Foto actual">
              <div class="sim-label antes">Tu sonrisa actual</div>
            </div>
            <div class="no-sim" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:#0d0d15;border-radius:12px;padding:30px;">
              <span style="font-size:32px">🔄</span>
              <span style="font-size:13px;color:var(--muted)">Simulación en preparación</span>
            </div>
          </div>
          `}
        </div>
      </div>
      ` : ''}

      ${p.tieneStl ? `
      <div class="card">
        <div class="card-header">
          <div class="icon">🦷</div>
          <h3>Modelo 3D de tus Dientes</h3>
        </div>
        <div class="card-body">
          <div id="visor3d"><div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);flex-direction:column;gap:8px"><div class="spinner"></div><span style="font-size:13px">Cargando modelo 3D...</span></div></div>
          <div class="visor-controls">
            <button class="visor-btn" onclick="resetCamara()">🔄 Reiniciar vista</button>
            <button class="visor-btn" onclick="toggleAutoRotar()">▶️ Auto-rotar</button>
            <button class="visor-btn" onclick="cambiarColor()">🎨 Color</button>
          </div>
          <p class="visor-tip">Arrastra para rotar · Pellizca para hacer zoom · Doble tap para reiniciar</p>
        </div>
      </div>
      ` : ''}

      <div class="card">
        <div class="card-header">
          <div class="icon">📋</div>
          <h3>Tu Plan de Tratamiento</h3>
        </div>
        <div class="card-body">
          <div class="trat-grid">
            <div class="trat-item">
              <div class="label">Tratamiento</div>
              <div class="value accent" style="font-size:14px">${p.tratamiento}</div>
            </div>
            <div class="trat-item">
              <div class="label">Duración estimada</div>
              <div class="value green">${p.duracion} meses</div>
            </div>
          </div>
          ${p.notas ? `<div class="notas-box"><strong style="color:var(--accent2)">📝 Notas del Dr. Correa:</strong><br><br>${p.notas}</div>` : ''}
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="icon">💰</div>
          <h3>Inversión en tu Sonrisa</h3>
        </div>
        <div class="card-body">
          <div class="presup-total">
            <div class="label">Inversión total del tratamiento</div>
            <div class="amount">${fmt(p.presupuesto_total)}</div>
          </div>
          <div class="presup-cuotas">
            <div class="cuota-box">
              <div class="cl">Cuota inicial</div>
              <div class="cv">${fmt(p.cuota_inicial)}</div>
            </div>
            <div class="cuota-box">
              <div class="cl">Cuota mensual</div>
              <div class="cv">${fmt(p.cuota_mensual)}</div>
            </div>
          </div>
        </div>
      </div>

      <div id="cta-section" class="cta-section">
        <h3>¿Listo para transformar tu sonrisa? 🚀</h3>
        <p>Esta es tu oportunidad de comenzar el tratamiento que cambiará tu confianza y tu vida.</p>
        <button class="btn-aceptar" onclick="abrirModal()">
          ✅ ¡Quiero iniciar mi tratamiento!
        </button>
        <a class="btn-wsp" href="https://wa.me/57${p.telefono ? '' : ''}?text=Hola+Dr.+Correa%2C+vi+mi+propuesta+y+tengo+preguntas" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Escribirle al Dr. Correa
        </a>
      </div>

      <div class="success-screen" id="success-screen">
        <div class="check">🎉</div>
        <h2>¡Bienvenido a la familia!</h2>
        <p>${p.nombre.split(' ')[0]}, tu tratamiento ha sido confirmado. El Dr. Correa se pondrá en contacto contigo muy pronto para coordinar el inicio.</p>
        <a class="btn-wsp" href="https://wa.me/57?text=Hola+Dr.+Correa%2C+acabo+de+confirmar+mi+tratamiento" target="_blank" style="max-width:280px">
          💬 Escribir al Dr. Correa
        </a>
      </div>
    </div>
  `;

  if (p.tieneStl) cargarSTL();
}

// TIMER
function iniciarTimer() {
  function actualizar() {
    const el = document.getElementById('timer');
    if (!el || !propuestaData) return;
    const diff = new Date(propuestaData.expira) - Date.now();
    if (diff <= 0) { mostrarExpirado(); return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  actualizar();
  setInterval(actualizar, 1000);
}

// VISOR 3D STL
let autoRotar = false;
let mesh = null;
let colores = ['#00e5a0','#f5a623','#4488ff','#ffffff'];
let colorIdx = 0;

async function cargarSTL() {
  try {
    const r = await fetch(`/api/propuesta/${token}/stl`);
    const d = await r.json();
    if (!d.stl) return;
    const base64 = d.stl.split(',')[1];
    const bin = atob(base64);
    const buf = new ArrayBuffer(bin.length);
    const view = new Uint8Array(buf);
    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    iniciarVisor3D(buf);
  } catch(e) {
    document.getElementById('visor3d').innerHTML = '<div class="no-stl"><span style="font-size:32px">🦷</span><span>No se pudo cargar el modelo 3D</span></div>';
  }
}

function iniciarVisor3D(buffer) {
  const container = document.getElementById('visor3d');
  if (!container) return;
  const W = container.clientWidth, H = 300;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080810);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
  camera.position.set(0, 0, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.innerHTML = '';
  container.appendChild(renderer.domElement);

  // Luces
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
  dir1.position.set(5, 5, 5);
  scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x8888ff, 0.3);
  dir2.position.set(-5, -5, -5);
  scene.add(dir2);

  // Parsear STL
  const geo = parsearSTL(buffer);
  geo.computeVertexNormals();
  geo.center();
  const box = new THREE.Box3().setFromObject(new THREE.Mesh(geo));
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3 / maxDim;

  const mat = new THREE.MeshPhongMaterial({ color: 0x00e5a0, specular: 0x333333, shininess: 60 });
  mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(scale);
  scene.add(mesh);

  // Controles táctiles/mouse
  let isDragging = false, prevX = 0, prevY = 0;
  const dom = renderer.domElement;

  dom.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  dom.addEventListener('mousemove', e => {
    if (!isDragging) return;
    mesh.rotation.y += (e.clientX - prevX) * 0.01;
    mesh.rotation.x += (e.clientY - prevY) * 0.01;
    prevX = e.clientX; prevY = e.clientY;
  });
  dom.addEventListener('mouseup', () => isDragging = false);

  dom.addEventListener('touchstart', e => { prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }, { passive: true });
  dom.addEventListener('touchmove', e => {
    mesh.rotation.y += (e.touches[0].clientX - prevX) * 0.015;
    mesh.rotation.x += (e.touches[0].clientY - prevY) * 0.015;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }, { passive: true });

  dom.addEventListener('wheel', e => { camera.position.z = Math.max(1, Math.min(15, camera.position.z + e.deltaY * 0.01)); });

  function animate() {
    requestAnimationFrame(animate);
    if (autoRotar && mesh) mesh.rotation.y += 0.008;
    renderer.render(scene, camera);
  }
  animate();
}

function parsearSTL(buffer) {
  const geo = new THREE.BufferGeometry();
  const view = new DataView(buffer);
  // Detectar binario vs ASCII
  const numTriangles = view.getUint32(80, true);
  const expectedSize = 84 + numTriangles * 50;

  if (buffer.byteLength === expectedSize) {
    // Binario
    const verts = new Float32Array(numTriangles * 9);
    const norms = new Float32Array(numTriangles * 9);
    for (let i = 0; i < numTriangles; i++) {
      const offset = 84 + i * 50;
      const nx = view.getFloat32(offset, true), ny = view.getFloat32(offset+4, true), nz = view.getFloat32(offset+8, true);
      for (let v = 0; v < 3; v++) {
        const voff = offset + 12 + v * 12;
        verts[i*9+v*3] = view.getFloat32(voff, true);
        verts[i*9+v*3+1] = view.getFloat32(voff+4, true);
        verts[i*9+v*3+2] = view.getFloat32(voff+8, true);
        norms[i*9+v*3] = nx; norms[i*9+v*3+1] = ny; norms[i*9+v*3+2] = nz;
      }
    }
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geo.setAttribute('normal', new THREE.BufferAttribute(norms, 3));
  } else {
    // ASCII fallback
    const text = new TextDecoder().decode(buffer);
    const verts = [];
    const re = /vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
    let m;
    while ((m = re.exec(text)) !== null) { verts.push(+m[1], +m[2], +m[3]); }
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  }
  return geo;
}

function resetCamara() { if (mesh) { mesh.rotation.set(0,0,0); } }
function toggleAutoRotar() { autoRotar = !autoRotar; }
function cambiarColor() {
  colorIdx = (colorIdx + 1) % colores.length;
  if (mesh) mesh.material.color.set(colores[colorIdx]);
}

  try {
